<!doctype html>
<html lang="de-CH">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Aare Böötle</title>
<style>
  :root{
    --bg:#1f312b;
    --card:#f1e7bd;
    --ink:#17251f;
    --muted:#6f684e;
    --river:#227b80;
    --sun:#e2a23a;
    --line:#ccb46b;
    --paper:#fff4ce;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100svh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#20352f; color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    padding:18px;
  }
  body:before{
    content:""; position:fixed; inset:0; z-index:-1;
    background:
      radial-gradient(circle at 84% 14%, rgba(226,162,58,.32), transparent 18%),
      linear-gradient(135deg,#152722 0%,#2d4a41 62%,#1e342f 100%);
  }
  main{
    width:min(470px,100%); background:var(--card);
    border:1px solid rgba(255,255,255,.22); border-radius:30px;
    padding:24px 22px 20px; box-shadow:0 34px 84px rgba(0,0,0,.30);
  }
  .kicker{font-size:13px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:850}
  h1{font-size:37px;line-height:.91;margin:10px 0 4px;letter-spacing:-.065em}
  .sub{margin:0 0 20px;color:var(--muted);font-size:15px}
  .panel{background:rgba(255,255,255,.36);border:1px solid rgba(23,37,31,.10);border-radius:22px;padding:16px;margin:14px 0}
  label{display:block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:850;color:var(--muted);margin-bottom:7px}
  select{
    width:100%;font-size:18px;font-weight:760;color:var(--ink);
    background:var(--paper);border:1px solid rgba(23,37,31,.18);border-radius:16px;
    padding:14px 13px;outline:none;
  }
  select+label{margin-top:13px}
  .visual{height:78px;margin:18px 0 12px;position:relative;border-radius:18px;background:#e4d58e;overflow:hidden;border:1px solid rgba(23,37,31,.08)}
  svg{width:100%;height:100%;display:block}
  .meta{display:flex;justify-content:space-between;gap:12px;font-size:13px;color:var(--muted);font-weight:750}
  .big{margin:16px 0 2px;text-align:center}
  .big .num{
    display:inline-block; font-size:98px; line-height:.80; font-weight:950; letter-spacing:-.10em;
    color:var(--card); -webkit-text-stroke:2.4px var(--ink);
    text-shadow:2px 4px 0 rgba(23,37,31,.12);
  }
  .big .unit{font-size:27px;font-weight:900;color:var(--ink);margin-left:7px}
  .caption{text-align:center;color:var(--muted);font-size:15px;margin:14px 0 0}
  .phrase{margin-top:19px;border-top:1px solid var(--line);padding-top:15px;font-size:18px;font-weight:880;letter-spacing:-.02em;color:#20342f}
  .fine{font-size:12px;line-height:1.35;color:var(--muted);margin-top:10px}
  .pill{display:inline-flex;align-items:center;gap:7px;background:#213d37;color:#f6f0d4;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800;margin-top:12px}
  .dot{width:7px;height:7px;border-radius:99px;background:var(--sun)}
</style>
</head>
<body>
<main>
  <div class="kicker">Aare Böötle</div>
  <h1>Los laa.<br>Langsam.</h1>
  <p class="sub">Vier Strecken. Kein GPS. Keine Exaktheit. Nur e grobi Zyt.</p>

  <section class="panel">
    <label for="route">Strecke</label>
    <select id="route">
      <option data-meters="22274" data-shape="M12,48 C82,16 108,62 164,34 S244,25 304,50 S385,66 438,26">Uttigen → Marzili</option>
      <option data-meters="5956" data-shape="M20,46 C75,23 111,25 150,48 S237,70 284,36 S354,27 428,54">Untertorbrücke → Worblaufen</option>
      <option data-meters="5168" data-shape="M20,37 C70,70 107,58 154,34 S231,8 282,43 S360,72 430,35">Worblaufen → Felsenaubrücke</option>
      <option data-meters="5429" data-shape="M20,50 C80,55 93,17 151,31 S229,63 279,44 S361,13 430,38">Felsenaubrücke → (H)Eymatt</option>
    </select>

    <label for="mode">Art</label>
    <select id="mode">
      <option data-speed="1.35">Böötle · treiben lassen</option>
      <option data-speed="1.65">SUP · ruhiger Paddelschlag</option>
    </select>
  </section>

  <div class="visual" aria-hidden="true">
    <svg viewBox="0 0 460 78" preserveAspectRatio="none">
      <path id="riverShadow" d="M12,48 C82,16 108,62 164,34 S244,25 304,50 S385,66 438,26" fill="none" stroke="rgba(23,37,31,.15)" stroke-width="17" stroke-linecap="round"/>
      <path id="riverPath" d="M12,48 C82,16 108,62 164,34 S244,25 304,50 S385,66 438,26" fill="none" stroke="#227b80" stroke-width="9" stroke-linecap="round"/>
      <circle cx="24" cy="48" r="6" fill="#e2a23a"/>
      <circle cx="436" cy="26" r="6" fill="#17251f"/>
    </svg>
  </div>

  <div class="meta">
    <span id="distanceText">–</span>
    <span id="modeText">–</span>
  </div>

  <section class="big" aria-live="polite">
    <span class="num" id="durationMain">–</span><span class="unit">h</span>
    <p class="caption" id="durationWords">Zyt wird berechnet.</p>
  </section>

  <div class="phrase">Zyt zum los la.</div>
  <div class="pill"><span class="dot"></span> Berner Langsamkeit: Feature, nid Bug.</div>
  <p class="fine">Schätzung für ruhiges Treiben. Kein Sicherheits- oder Pegelentscheid. Die Aare entscheidet immer mit.</p>
</main>

<script>
(function(){
  const route = document.getElementById('route');
  const mode = document.getElementById('mode');
  const durationMain = document.getElementById('durationMain');
  const durationWords = document.getElementById('durationWords');
  const distanceText = document.getElementById('distanceText');
  const modeText = document.getElementById('modeText');
  const riverPath = document.getElementById('riverPath');
  const riverShadow = document.getElementById('riverShadow');

  function words(h, min){
    const hw = ['null','eine','zwei','drei','vier','fünf','sechs','sieben','acht','neun','zehn'];
    let t = 'ungefähr ' + (hw[h] || String(h)) + ' Stunde' + (h === 1 ? '' : 'n');
    if(min > 0) t += ' und ' + min + ' Minuten';
    return t;
  }

  function update(){
    const selectedRoute = route.options[route.selectedIndex];
    const selectedMode = mode.options[mode.selectedIndex];
    const meters = Number(selectedRoute.dataset.meters);
    const speed = Number(selectedMode.dataset.speed);
    const minutes = Math.max(5, Math.round((meters / speed / 60) / 5) * 5);
    const h = Math.floor(minutes / 60);
    const min = minutes % 60;

    durationMain.textContent = h + ':' + String(min).padStart(2,'0');
    durationWords.textContent = words(h, min);
    distanceText.textContent = (meters / 1000).toFixed(1) + ' km';
    modeText.textContent = selectedMode.textContent.split('·')[0].trim();

    const shape = selectedRoute.dataset.shape;
    riverPath.setAttribute('d', shape);
    riverShadow.setAttribute('d', shape);
  }

  route.addEventListener('change', update);
  route.addEventListener('input', update);
  mode.addEventListener('change', update);
  mode.addEventListener('input', update);
  window.addEventListener('pageshow', update);
  document.addEventListener('DOMContentLoaded', update);
  update();
})();
</script>
</body>
</html>
