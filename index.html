const routeEl = document.getElementById('route');
const modeEl = document.getElementById('mode');
const durationEl = document.getElementById('duration');
const etaEl = document.getElementById('eta');
const distEl = document.getElementById('dist');
const flowPill = document.getElementById('flowPill');
const speedPill = document.getElementById('speedPill');
const dataNote = document.getElementById('dataNote');
const path = document.getElementById('riverPath');
const shadow = document.getElementById('riverShadow');

let currentFlow = 197;
let hasLiveFlow = false;
const REF_FLOW = 197;
const REF_SPEED_PACKRAFT = 3.80;
const FLOW_EXPONENT = 0.45;

function fillRoutes(){
  routeEl.innerHTML = '';
  ROUTES.forEach((r)=>{
    const opt=document.createElement('option');
    opt.value=r.id; opt.textContent=r.label;
    routeEl.appendChild(opt);
  });
}
function selectedRoute(){ return ROUTES.find(r=>r.id===routeEl.value) || ROUTES[0]; }
function minutesToText(total){
  total=Math.max(1, Math.round(total));
  const h=Math.floor(total/60); const m=total%60;
  if(h<=0) return `${m} min`;
  return `${h}h ${String(m).padStart(2,'0')}`;
}
function flowTempo(flow){
  if(flow < 130) return 'langsam';
  if(flow > 250) return 'schnell';
  return 'mittel';
}
function update(){
  const r=selectedRoute();
  const mode=parseFloat(modeEl.value);
  const flowFactor=Math.pow((currentFlow || REF_FLOW)/REF_FLOW, FLOW_EXPONENT);
  const speed=REF_SPEED_PACKRAFT * mode * flowFactor;
  const km=r.meters/1000;
  const minutes=(km/speed)*60;
  durationEl.textContent = minutesToText(minutes);
  const etaDate = new Date(Date.now() + Math.max(0, minutes) * 60000);
  etaEl.textContent = `Ankunft ca. ${etaDate.toLocaleTimeString('de-CH', {hour:'2-digit', minute:'2-digit'})} Uhr`;
  distEl.textContent = `${km.toLocaleString('de-CH', {minimumFractionDigits:1, maximumFractionDigits:1})} km`;
  speedPill.textContent = `${speed.toFixed(1)} km/h`;
  path.setAttribute('d', r.path);
  shadow.setAttribute('d', r.path);
  const tempo = flowTempo(currentFlow);
  flowPill.textContent = hasLiveFlow ? `Aare: ${Math.round(currentFlow)} m³/s · ${tempo}` : `Aare: ${Math.round(currentFlow)} m³/s Referenz · ${tempo}`;
  if(currentFlow >= 300) dataNote.innerHTML = '<span class="warn">Viel Wasser.</span> Das hier ist keine Sicherheitsempfehlung, nur ein Zeitgefühl.';
  else dataNote.textContent = 'Grobe Erfahrungsrechnung. Keine Hydrologie. Nur ein Zeitgefühl fürs Treibenlassen.';
}
async function loadFlow(){
  try{
    const url='https://aareguru.existenz.ch/v2018/current?city=bern&app=ch.aarezyt.web&version=0.15';
    const res=await fetch(url, {cache:'no-store'});
    if(!res.ok) throw new Error('API');
    const data=await res.json();
    const flow = data?.aare?.flow ?? data?.flow ?? null;
    if(typeof flow === 'number' && isFinite(flow)){
      currentFlow = flow;
      hasLiveFlow = true;
    }
  }catch(e){
    currentFlow = REF_FLOW;
    hasLiveFlow = false;
  }
  update();
}
fillRoutes();
routeEl.addEventListener('change', update);
modeEl.addEventListener('change', update);
routeEl.addEventListener('input', update);
modeEl.addEventListener('input', update);
update();
loadFlow();
