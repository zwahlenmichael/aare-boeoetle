<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aare Böötle</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#d8d0c4;
    color:#1d2a2f;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:520px;
    text-align:center;
}

h1{
    font-size:2.2rem;
    line-height:1.05;
    margin-bottom:2.5rem;
    font-weight:800;
    letter-spacing:-0.03em;
}

select{
    width:100%;
    padding:18px;
    margin-bottom:16px;
    border:none;
    border-radius:20px;
    font-size:1rem;
    background:#f5f1eb;
    color:#1d2a2f;
    appearance:none;
}

.icon{
    width:100%;
    height:90px;
    margin:2rem 0;
}

.duration{
    font-size:5rem;
    font-weight:900;
    line-height:0.9;
    color:transparent;
    -webkit-text-stroke:2px #1d2a2f;
    margin:0;
}

.subtitle{
    margin-top:0.8rem;
    font-size:1rem;
    opacity:0.8;
}

.footer{
    margin-top:2rem;
    font-size:0.95rem;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<h1>Loslassen.<br>Langsam.<br>Langsam.</h1>

<select id="route">
<option value="17184">Uttigen → Marzili</option>
<option value="6000">Untertor → Worblaufen</option>
<option value="5210">Worblaufen → Felsenaubrücke</option>
<option value="5429">Felsenaubrücke → (H)Eymatt</option>
</select>

<select id="mode">
<option value="1">Böötle</option>
<option value="0.82">SUP</option>
</select>

<svg class="icon" viewBox="0 0 300 100">
<path id="river"
d="M10,60 C60,20 90,90 140,50 C180,20 210,80 290,40"
fill="none"
stroke="#1d2a2f"
stroke-width="6"
stroke-linecap="round"/>
</svg>

<div class="duration" id="duration">2h 05</div>

<div class="subtitle">
Zyt zum los la.
</div>

<div class="footer">
Berner Langsamkeit
</div>

</div>

<script>

const routeSelect = document.getElementById('route');
const modeSelect = document.getElementById('mode');
const duration = document.getElementById('duration');
const river = document.getElementById('river');

function update(){

    const meters = parseFloat(routeSelect.value);
    const modifier = parseFloat(modeSelect.value);

    const speed = 2.3 * modifier;

    const hours = meters / 1000 / speed;

    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);

    duration.innerHTML = `${h}h ${String(m).padStart(2,'0')}`;

    const routeName = routeSelect.options[routeSelect.selectedIndex].text;

    if(routeName.includes("Uttigen")){
        river.setAttribute("d","M10,70 C50,10 90,90 140,40 C180,10 230,80 290,30");
    }
    else if(routeName.includes("Untertor")){
        river.setAttribute("d","M10,50 C70,30 100,70 170,50 C220,40 250,60 290,45");
    }
    else if(routeName.includes("Worblaufen")){
        river.setAttribute("d","M10,60 C50,40 80,80 140,40 C180,20 220,70 290,35");
    }
    else{
        river.setAttribute("d","M10,60 C60,20 90,90 140,50 C180,20 210,80 290,40");
    }
}

routeSelect.addEventListener('change', update);
modeSelect.addEventListener('change', update);

update();

</script>

</body>
</html>
